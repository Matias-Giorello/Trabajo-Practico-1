<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Counter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <img src="./assets/logoHeader.png" alt="Imagen de un logo decorativo">
        <p class="pDelHeader">Character Counter</p>
        <img src="./assets/ajustesHeader.png" alt="Imagen de una tuerca de ajustes">
    </header>
    <h1>
        Analyze your text in real-time.
    </h1>
    <textarea name="areaDeTexto" id="userText">Lorem ipsum dolor sit, amet consectetur adipisicing elit. Provident velit eum sit. Vitae, omnis quibusdam dolores qui aperiam saepe pariatur?</textarea>
    <section class="inputSection">
        <input type="checkbox" class="checkbox1"> <p class="pCheckbox1">Exclude Spaces</p>
        <input type="checkbox" class="checkbox2"> <p class="pCheckbox2">Set Character Limit</p>
        <p class="pCheckbox3">Approx. reading time: 1 minute</p>
    </section>
    <section class="summarySection">
        <div>
            <h2>278</h2>
            <p>Total Characters</p>
        </div>
        <div>
            <h2>39</h2>
            <p>Word Count</p>
        </div>
        <div>
            <h2>04</h2>
            <p>Sentence Count</p>
        </div>
    </section>
</body>
</html>
