<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Counter</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="logo&p">
            <img src="./assets/images/logoHeader.png" alt="Imagen de un logo decorativo" class="mainLogo" width="30" height="30">
            <p>Character Counter</p>
        </div>
        <div class="settings">
            <img src="./assets/images/ajustesHeader.png" alt="Imagen de una tuerca de ajustes" class="settingsLogo" width="20" height="20">
        </div>
    </header>
    <h1>
        Analyze your text <span>in real-time.</span>
    </h1>
    <textarea name="areaDeTexto" id="userText">Lorem ipsum dolor sit, amet consectetur adipisicing elit. Provident velit eum sit. Vitae, omnis quibusdam dolores qui aperiam saepe pariatur?</textarea>
    <section class="inputSection">
        <input type="checkbox" class="checkbox1"> <p class="pCheckbox1">Exclude Spaces</p>
        <input type="checkbox" class="checkbox2"> <p class="pCheckbox2">Set Character Limit</p>
        <p class="pCheckbox3">Approx. reading time: 1 minute</p>
    </section>
    <section class="summarySection">
        <div class="card1">
            <h2>278</h2>
            <p>Total Characters</p>
        </div>
        <div class="card2">
            <h2>39</h2>
            <p>Word Count</p>
        </div>
        <div class="card3">
            <h2>04</h2>
            <p>Sentence Count</p>
        </div>
    </section>
    <section class="letterDensitySection">
        <h2>Letter Density</h2>
        <div>
            <p class="leftLetterDensity">E</p>
            <meter min="0" max="278" value="40"></meter>
            <p class="rightLetterDensity">40 (16.06%)</p>
        </div>
        <div>
            <p class="leftLetterDensity">I</p>
            <meter min="0" max="278" value="29"> </meter>
            <p class="rightLetterDensity">29 (11.65%)</p>
        </div>
        <div>    
            <p class="leftLetterDensity">T</p>
            <meter min="0" max="278" value="28"></meter> 
            <p class="rightLetterDensity">28 (11.24%)</p>
        </div>
        <div>
            <p class="leftLetterDensity">O</p>
            <meter min="0" max="278" value="22"></meter>
            <p class="rightLetterDensity">22 (8.84%)</p>
        </div>
        <div>
            <p class="leftLetterDensity">N</p>
            <meter min="0" max="278" value="21"></meter>
            <p class="rightLetterDensity">21 (8.43%)</p>
        </div>
    </section>
    <footer>
        <p>See more ▼</p>
    </footer>
</body>
</html>
